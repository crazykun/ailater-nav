{{ define "partials/suggestions.html" }}
{{ if .suggestions }}
{{ range .suggestions }}
<div class="px-4 py-3 hover:bg-gray-100 dark:hover:bg-gray-700 cursor-pointer transition-colors"
     hx-get="/api/search?q={{ . }}"
     hx-target="#search-results"
     hx-swap="innerHTML"
     @click="$refs.searchInput.value = '{{ . }}'; $refs.searchInput.dispatchEvent(new Event('search'))">
    <div class="flex items-center gap-3">
        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
        </svg>
        <span class="text-gray-700 dark:text-gray-300">{{ . }}</span>
    </div>
</div>
{{ end }}
{{ end }}
{{ end }}
