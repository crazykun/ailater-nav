{{ define "partials/password-form.html" }}
<form hx-post="/api/auth/change-password" hx-target="#password-form" hx-swap="innerHTML" class="space-y-3">
    {{ if .error }}
    <div class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-600 dark:text-red-400 px-3 py-2.5 rounded-lg text-sm flex items-center gap-2">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        {{ .error }}
    </div>
    {{ end }}

    {{ if .success }}
    <div class="bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 text-green-600 dark:text-green-400 px-3 py-2.5 rounded-lg text-sm flex items-center gap-2">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        {{ .success }}
    </div>
    {{ end }}

    <div>
        <label for="current_password" class="block text-sm text-gray-600 dark:text-gray-400 mb-1">当前密码</label>
        <input type="password" id="current_password" name="current_password" required
               class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-colors">
    </div>

    <div>
        <label for="new_password" class="block text-sm text-gray-600 dark:text-gray-400 mb-1">新密码</label>
        <input type="password" id="new_password" name="new_password" required minlength="6"
               placeholder="至少6位"
               class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-colors">
    </div>

    <div>
        <label for="confirm_password" class="block text-sm text-gray-600 dark:text-gray-400 mb-1">确认新密码</label>
        <input type="password" id="confirm_password" name="confirm_password" required minlength="6"
               placeholder="再次输入新密码"
               class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-colors">
    </div>

    <button type="submit" class="w-full bg-blue-500 text-white text-sm py-2.5 rounded-lg hover:bg-blue-600 transition-colors font-medium">
        修改密码
    </button>
</form>
{{ end }}
