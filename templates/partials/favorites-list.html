{{ define "partials/favorites-list.html" }}
{{ if .favoriteSites }}
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3">
    {{ range .favoriteSites }}
    <div class="group relative bg-white dark:bg-gray-800 rounded-xl p-4 border border-gray-200 dark:border-gray-700 hover:border-blue-300 dark:hover:border-blue-600 hover:shadow-md transition-all duration-200">
        <a href="{{ .URL }}" target="_blank" rel="noopener noreferrer" class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-lg shrink-0 flex items-center justify-center text-white font-bold text-sm shadow-sm"
                 style="background-color: {{ .Color }}">
                {{ .Initials }}
            </div>
            <div class="flex-1 min-w-0">
                <div class="font-medium text-sm text-gray-900 dark:text-white truncate group-hover:text-blue-500 transition-colors">
                    {{ .Name }}
                </div>
                <div class="text-xs text-gray-500 dark:text-gray-400 truncate mt-0.5">
                    {{ .Description }}
                </div>
            </div>
        </a>
        <button hx-post="/api/favorites/{{ .ID }}?from=dashboard" 
                hx-target="#favorites-container"
                hx-swap="innerHTML"
                class="absolute top-1 right-1 p-1 rounded text-yellow-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 opacity-0 group-hover:opacity-100 transition-all duration-200"
                title="取消收藏"
                onclick="event.stopPropagation(); event.preventDefault();">
            <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path>
            </svg>
        </button>
    </div>
    {{ end }}
</div>
{{ else }}
<div class="bg-white dark:bg-gray-800 rounded-2xl p-8 sm:p-12 text-center border border-gray-200 dark:border-gray-700">
    <svg class="w-12 h-12 text-gray-300 dark:text-gray-600 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"></path>
    </svg>
    <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-2">还没有收藏</h3>
    <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">浏览 AI 工具，点击星标添加收藏</p>
    <a href="/" class="inline-flex items-center gap-2 bg-blue-500 text-white text-sm px-5 py-2.5 rounded-lg hover:bg-blue-600 transition-colors font-medium">
        浏览工具
    </a>
</div>
{{ end }}
{{ end }}
