{{ define "partials/setup-form.html" }}
<form hx-post="/api/setup" hx-target="#setup-container" hx-swap="innerHTML" class="space-y-4">
    {{ if .error }}
    <div class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-600 dark:text-red-400 px-4 py-3 rounded-lg text-sm flex items-center gap-2">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        {{ .error }}
    </div>
    {{ end }}

    <div class="bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 text-blue-700 dark:text-blue-300 px-4 py-3 rounded-lg text-sm">
        首次使用，请创建管理员账号。该账号拥有后台管理权限。
    </div>

    <div>
        <label for="username" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">管理员用户名</label>
        <input type="text" id="username" name="username" required minlength="3" maxlength="20"
               pattern="[a-zA-Z0-9_]+"
               title="只能包含字母、数字和下划线"
               placeholder="3-20个字符"
               class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-colors">
    </div>

    <div>
        <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">密码</label>
        <input type="password" id="password" name="password" required minlength="6"
               placeholder="至少6位"
               class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-colors">
    </div>

    <div>
        <label for="confirm_password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">确认密码</label>
        <input type="password" id="confirm_password" name="confirm_password" required minlength="6"
               placeholder="再次输入密码"
               class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-colors">
    </div>

    <button type="submit" class="w-full bg-blue-500 text-white py-3 rounded-lg hover:bg-blue-600 transition-colors font-medium">
        创建管理员
    </button>
</form>
{{ end }}
