{{ template "layout.html" . }}

{{ define "content" }}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <a href="/" class="inline-block mb-4">
                <img src="/static/img/logo.png" alt="AI Later" class="w-16 h-16 mx-auto">
            </a>
            <h1 class="text-3xl font-bold text-gray-900 dark:text-white">创建账号</h1>
            <p class="text-gray-500 dark:text-gray-400 mt-2">加入 AI Later，发现更多 AI 工具</p>
        </div>
        
        <div id="register-container" class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8 border border-gray-100 dark:border-gray-700">
            {{ template "partials/register-form.html" . }}
        </div>
    </div>
</div>
{{ end }}
