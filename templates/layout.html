<!DOCTYPE html>
<html lang="zh-CN" x-data="{ 
    dark: localStorage.getItem('dark') === 'true',
    mobileMenu: false,
    mobileSearch: false
}" 
:class="{ 'dark': dark }"
x-init="$watch('dark', v => localStorage.setItem('dark', v))">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI工具导航 - AI Later</title>
    <meta name="keywords" content="AI导航站, AI工具, 人工智能工具"/>
    <meta name="description" content="AI工具导航是一个致力于提供优质AI工具的网站，帮助你快速找到适合自己的AI工具。"/>
    <link rel="icon" href="/static/img/ico.png" type="image/x-icon">
    <script src="/static/css/tailwind-3.4.17.css"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/htmx.min.js"></script>
    <script defer src="/static/js/alpine.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        }
        
        /* 暗色模式基础样式 */
        .dark body { background-color: #111827; color: #f3f4f6; }
        .dark .bg-white { background-color: #1f2937; }
        .dark .bg-gray-50 { background-color: #111827; }
        .dark .bg-gray-100 { background-color: #374151; }
        .dark .text-gray-900 { color: #f9fafb; }
        .dark .text-gray-700 { color: #d1d5db; }
        .dark .text-gray-600 { color: #9ca3af; }
        .dark .border-gray-200 { border-color: #374151; }
        .dark .border-gray-300 { border-color: #4b5563; }
        .dark .shadow-sm { box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.3); }
        .dark .shadow-lg { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4); }
        .dark .hover\:bg-blue-50:hover { background-color: #1e3a5f; }
        .dark .hover\:text-blue-500:hover { color: #60a5fa; }
        
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        /* HTMX 加载指示器 */
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-block; }
        .htmx-request.htmx-indicator { display: inline-block; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition-colors duration-200">
    <!-- Header -->
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50 transition-colors duration-200">
        <div class="container mx-auto px-4 py-3">
            <div class="flex justify-between items-center">
                <!-- Logo -->
                <a href="/" class="flex items-center gap-3 flex-shrink-0">
                    <img src="/static/img/logo.png" alt="AI导航" class="w-10 h-10">
                    <span class="text-xl font-bold text-gray-900 dark:text-white hidden lg:block">AI Later</span>
                </a>
                
                <!-- 搜索框 (PC端) -->
                <div class="flex-1 min-w-[200px] mx-4 hidden sm:block" @keydown.slash.window.prevent="$refs.searchInput.focus()">
                    <div class="relative">
                        <input 
                            x-ref="searchInput"
                            type="search" 
                            name="q"
                            value="{{ .query }}"
                            placeholder="搜索AI工具... (按 / 聚焦)" 
                            hx-get="/api/search"
                            hx-trigger="input changed delay:300ms, search"
                            hx-target="#search-results"
                            hx-indicator="#search-loading"
                            class="w-full px-4 py-2.5 pl-11 pr-4 text-gray-700 dark:text-gray-200 bg-gray-100 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-full focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200"
                        >
                        <div class="absolute inset-y-0 left-0 flex items-center pl-4">
                            <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                            </svg>
                        </div>
                        <div id="search-loading" class="htmx-indicator absolute inset-y-0 right-0 flex items-center pr-4">
                            <svg class="animate-spin h-5 w-5 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                        </div>
                        <kbd class="hidden lg:inline-flex absolute inset-y-0 right-0 items-center pr-3 text-xs text-gray-400 bg-gray-200 dark:bg-gray-600 px-1.5 rounded mr-2">/</kbd>
                    </div>
                </div>
                
                <div class="flex items-center gap-2">
                    <!-- 暗色模式切换 -->
                    <button @click="dark = !dark" class="p-2 text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 rounded-lg transition-colors">
                        <svg x-show="!dark" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                        </svg>
                        <svg x-show="dark" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
                        </svg>
                    </button>
                    
                    <!-- 移动端搜索按钮 -->
                    <button @click="mobileSearch = !mobileSearch" class="sm:hidden p-2 text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 rounded-lg transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </button>
                    
                    <!-- 导航菜单 (PC端) -->
                    <nav class="hidden sm:flex items-center gap-1">
                        <a href="/" class="px-3 py-2 text-sm text-gray-700 dark:text-gray-300 hover:text-blue-500 hover:bg-blue-50 dark:hover:bg-gray-700 rounded-lg font-medium transition-all">全部</a>
                        <a href="/search?category=AI对话" class="px-3 py-2 text-sm text-gray-700 dark:text-gray-300 hover:text-blue-500 hover:bg-blue-50 dark:hover:bg-gray-700 rounded-lg font-medium transition-all">对话</a>
                        <a href="/search?category=AI创作" class="px-3 py-2 text-sm text-gray-700 dark:text-gray-300 hover:text-blue-500 hover:bg-blue-50 dark:hover:bg-gray-700 rounded-lg font-medium transition-all">创作</a>
                        <a href="/search?category=AI编程" class="px-3 py-2 text-sm text-gray-700 dark:text-gray-300 hover:text-blue-500 hover:bg-blue-50 dark:hover:bg-gray-700 rounded-lg font-medium transition-all">编程</a>
                        <a href="/search?category=AI工具" class="px-3 py-2 text-sm text-gray-700 dark:text-gray-300 hover:text-blue-500 hover:bg-blue-50 dark:hover:bg-gray-700 rounded-lg font-medium transition-all">工具</a>
                    </nav>
                    
                    <!-- 用户菜单 -->
                    {{ if .isLoggedIn }}
                    <div x-data="{ open: false }" class="relative">
                        <button @click="open = !open" class="flex items-center gap-2 px-3 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                            <span class="hidden lg:inline">{{ .username }}</span>
                        </button>
                        <div x-show="open" @click.away="open = false" x-transition class="absolute right-0 mt-2 w-48 bg-white dark:bg-gray-800 rounded-lg shadow-lg border border-gray-200 dark:border-gray-700 py-1 z-50">
                            <a href="/dashboard" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">个人中心</a>
                            <a href="/admin/" class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">管理后台</a>
                            <hr class="my-1 border-gray-200 dark:border-gray-700">
                            <button hx-post="/api/auth/logout" class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-gray-100 dark:hover:bg-gray-700">退出登录</button>
                        </div>
                    </div>
                    {{ else }}
                    <a href="/login" class="px-4 py-2 text-sm bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors">登录</a>
                    {{ end }}
                    
                    <!-- 移动端菜单按钮 -->
                    <button @click="mobileMenu = !mobileMenu" class="sm:hidden p-2 text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 rounded-lg transition-colors">
                        <svg x-show="!mobileMenu" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                        <svg x-show="mobileMenu" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            </div>
            
            <!-- 移动端搜索框 -->
            <div x-show="mobileSearch" x-transition class="sm:hidden mt-3">
                <div class="relative">
                    <input 
                        type="search" 
                        name="q"
                        placeholder="搜索AI工具..." 
                        hx-get="/api/search"
                        hx-trigger="input changed delay:300ms, search"
                        hx-target="#search-results"
                        class="w-full px-4 py-2.5 pl-11 text-gray-700 dark:text-gray-200 bg-gray-100 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-full focus:outline-none focus:ring-2 focus:ring-blue-500"
                    >
                    <div class="absolute inset-y-0 left-0 flex items-center pl-4">
                        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </div>
                </div>
            </div>
            
            <!-- 移动端导航菜单 -->
            <div x-show="mobileMenu" x-transition class="sm:hidden mt-3">
                <nav class="bg-gray-50 dark:bg-gray-700 rounded-lg p-3 space-y-1">
                    <a href="/" class="block px-3 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 rounded-lg">全部</a>
                    <a href="/search?category=AI对话" class="block px-3 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 rounded-lg">对话</a>
                    <a href="/search?category=AI创作" class="block px-3 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 rounded-lg">创作</a>
                    <a href="/search?category=AI编程" class="block px-3 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 rounded-lg">编程</a>
                    <a href="/search?category=AI工具" class="block px-3 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 rounded-lg">工具</a>
                </nav>
            </div>
        </div>
    </header>

    {{ template "content" . }}

    <!-- 站点详情模态框 -->
    <div id="site-modal" x-data="{ open: false }" @keydown.escape.window="open = false" x-show="open" x-transition class="fixed inset-0 z-50 overflow-y-auto" style="display: none;">
        <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
            <div x-show="open" x-transition.opacity class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" @click="open = false"></div>
            <div id="modal-content" x-show="open" x-transition class="inline-block align-bottom bg-white dark:bg-gray-800 rounded-2xl text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
                <!-- HTMX will load content here -->
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-gray-900 dark:bg-gray-950 text-white py-8 mt-12 transition-colors duration-200">
        <div class="container mx-auto px-4">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-3">
                    <img src="/static/img/logo.png" alt="AI导航" class="w-8 h-8">
                    <span class="text-lg font-bold">AI Later</span>
                </div>
                
                <p class="text-gray-400 text-sm text-center">
                    发现和使用最优质的人工智能工具，提升工作效率和创造力。
                </p>
                
                <div class="text-sm text-gray-400">
                    &copy; 2026 AI Later. {{ .Copyright }}
                </div>
            </div>
        </div>
    </footer>

    <script src="/static/js/main.js"></script>
</body>
</html>
