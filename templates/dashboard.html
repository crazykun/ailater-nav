{{ template "layout.html" . }}

{{ define "content" }}
<div class="min-h-screen py-12 px-4">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-900 mb-8">个人中心</h1>
        
        <div class="bg-white rounded-2xl shadow-lg p-8 mb-8">
            <h2 class="text-xl font-bold text-gray-800 mb-4">欢迎, {{ .username }}</h2>
            <p class="text-gray-600">收藏的站点: {{ len .favoriteIDs }} 个</p>
        </div>
        
        <div class="bg-white rounded-2xl shadow-lg p-8">
            <h2 class="text-xl font-bold text-gray-800 mb-4">我的收藏</h2>
            <p class="text-gray-500">收藏功能即将上线...</p>
        </div>
    </div>
</div>
{{ end }}
