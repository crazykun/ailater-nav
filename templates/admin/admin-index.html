<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title>仪表盘 - AI导航</title>
    {{ template "admin-head" . }}
</head>
<body class="admin-body">
    <div class="admin-shell">
        {{ template "admin-sidebar" . }}
        <div class="admin-main">
            {{ template "admin-topbar" . }}
            <main class="admin-content">
                <section class="admin-stat-grid">
                    <a href="/admin/sites" class="admin-stat-card cursor-pointer">
                        <span class="admin-stat-label">站点总数</span>
                        <span class="admin-stat-value">{{ .siteCount }}</span>
                    </a>
                    <a href="/admin/users" class="admin-stat-card cursor-pointer">
                        <span class="admin-stat-label">用户总数</span>
                        <span class="admin-stat-value">{{ .userCount }}</span>
                    </a>
                </section>
                <section class="admin-surface admin-status-panel">
                    <h2 class="admin-section-title">系统状态</h2>
                    <p class="admin-status-ok">运行中</p>
                </section>
            </main>
        </div>
    </div>
</body>
</html>
