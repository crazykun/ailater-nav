<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title>站点管理 - AI导航</title>
    {{ template "admin-head" . }}
</head>
<body class="admin-body">
    <div class="admin-shell">
        {{ template "admin-sidebar" . }}
        <div class="admin-main">
            {{ template "admin-topbar" . }}
            <main class="admin-content">
                <section class="admin-toolbar-row">
                    <div class="admin-toolbar-meta">
                        <span class="admin-chip">{{ len .sites }} 个站点</span>
                    </div>
                    <a href="/admin/sites/add" class="admin-btn-primary">添加站点</a>
                </section>

                <section class="admin-surface overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="admin-table min-w-full">
                            <thead>
                                <tr>
                                    <th class="admin-table-head text-left">名称</th>
                                    <th class="admin-table-head text-left">URL</th>
                                    <th class="admin-table-head text-left">标签</th>
                                    <th class="admin-table-head text-right">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                {{ range .sites }}
                                <tr data-name="{{ .Name }}">
                                    <td class="admin-table-cell">
                                        <div class="flex items-center">
                                            <div class="flex-shrink-0 h-10 w-10">
                                                {{ if .Logo }}
                                                <img class="h-10 w-10 rounded-full" src="{{ .Logo }}" alt="{{ .Name }}">
                                                {{ else }}
                                                <div class="h-10 w-10 rounded-full flex items-center justify-center text-white font-bold text-sm" style="background-color: {{ .Color }}">
                                                    {{ .Initials }}
                                                </div>
                                                {{ end }}
                                            </div>
                                            <div class="ml-4">
                                                <div class="text-sm font-medium text-gray-900">{{ .Name }}</div>
                                                <div class="text-sm text-gray-500">{{ .Description }}</div>
                                            </div>
                                        </div>
                                    </td>
                                    <td class="admin-table-cell">
                                        <div class="text-sm text-gray-900">{{ .URL }}</div>
                                    </td>
                                    <td class="admin-table-cell">
                                        <div class="flex flex-wrap gap-2">
                                            {{ range .Tags }}
                                            <span class="admin-badge">{{ . }}</span>
                                            {{ end }}
                                        </div>
                                    </td>
                                    <td class="admin-table-cell text-right">
                                        <a href="/admin/sites/edit/{{ .ID }}" class="admin-link mr-3">编辑</a>
                                        <a href="/admin/sites/delete/{{ .ID }}" class="admin-link-danger" onclick="return confirm('确定要删除这个站点吗？')">删除</a>
                                    </td>
                                </tr>
                                {{ end }}
                            </tbody>
                        </table>
                    </div>
                </section>
            </main>
        </div>
    </div>
</body>
</html>
